---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: netflix-devops

---
# ConfigMap for backend configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: netflix-devops
data:
  NODE_ENV: "production"
  PORT: "5000"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: netflix-secrets
  namespace: netflix-devops
type: Opaque
stringData:
  mongodb-uri: "mongodb://admin:password@mongodb:27017/netflix"
  jwt-secret: "netflix-secret-key-change-in-production"
  db-username: "admin"
  db-password: "password"

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-backend
  namespace: netflix-devops
  labels:
    app: netflix-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netflix-backend
  template:
    metadata:
      labels:
        app: netflix-backend
        version: v1
    spec:
      containers:
      - name: backend
        image: netflix-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: netflix-secrets
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: netflix-secrets
              key: jwt-secret
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: NODE_ENV
        
        # Resource requests and limits
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: netflix-backend
  namespace: netflix-devops
  labels:
    app: netflix-backend
spec:
  type: ClusterIP
  selector:
    app: netflix-backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    name: http

---
# Horizontal Pod Autoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netflix-backend-hpa
  namespace: netflix-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netflix-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
