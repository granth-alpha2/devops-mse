---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-frontend
  namespace: netflix-devops
  labels:
    app: netflix-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netflix-frontend
  template:
    metadata:
      labels:
        app: netflix-frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: netflix-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "http://netflix-api.netflix-devops.svc.cluster.local:8080/api"
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: netflix-frontend
  namespace: netflix-devops
  labels:
    app: netflix-frontend
spec:
  type: LoadBalancer
  selector:
    app: netflix-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http

---
# Frontend HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netflix-frontend-hpa
  namespace: netflix-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netflix-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
