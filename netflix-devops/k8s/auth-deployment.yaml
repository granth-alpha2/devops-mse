---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-auth
  namespace: netflix-devops
  labels:
    app: netflix-auth
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netflix-auth
  template:
    metadata:
      labels:
        app: netflix-auth
        version: v1
    spec:
      containers:
      - name: auth
        image: netflix-auth:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: MONGODB_URI
          value: "mongodb://admin:password@mongodb:27017/netflix-auth"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: netflix-secrets
              key: jwt-secret
        - name: PORT
          value: "5001"
        
        resources:
          requests:
            memory: "100Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2

---
# Auth Service Service
apiVersion: v1
kind: Service
metadata:
  name: netflix-auth
  namespace: netflix-devops
spec:
  type: ClusterIP
  selector:
    app: netflix-auth
  ports:
  - protocol: TCP
    port: 5001
    targetPort: 5001

---
# Auth Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netflix-auth-hpa
  namespace: netflix-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netflix-auth
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
