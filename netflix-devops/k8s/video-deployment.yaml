---
# Video Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-video
  namespace: netflix-devops
  labels:
    app: netflix-video
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netflix-video
  template:
    metadata:
      labels:
        app: netflix-video
        version: v1
    spec:
      containers:
      - name: video
        image: netflix-video:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5002
          name: http
        env:
        - name: MONGODB_URI
          value: "mongodb://admin:password@mongodb:27017/netflix-videos"
        - name: PORT
          value: "5002"
        
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5002
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2

---
# Video Service Service
apiVersion: v1
kind: Service
metadata:
  name: netflix-video
  namespace: netflix-devops
spec:
  type: ClusterIP
  selector:
    app: netflix-video
  ports:
  - protocol: TCP
    port: 5002
    targetPort: 5002

---
# Video Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netflix-video-hpa
  namespace: netflix-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netflix-video
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
