groups:
  - name: netflix-alerts
    interval: 30s
    rules:
      # Application alerts
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for {{ $labels.job }}"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_ms_bucket[5m])) > 1000
        for: 5m
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1000ms for {{ $labels.job }}"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
        for: 5m
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% for {{ $labels.pod_name }}"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[1h]) > 0
        for: 5m
        annotations:
          summary: "Pod crash looping"
          description: "Pod {{ $labels.pod }} is crash looping"

      - alert: DatabaseDown
        expr: up{job="mongodb"} == 0
        for: 1m
        annotations:
          summary: "Database is down"
          description: "MongoDB is not responding"

      - alert: ServiceDown
        expr: up{job=~"netflix-.*"} == 0
        for: 2m
        annotations:
          summary: "Service down"
          description: "Service {{ $labels.job }} is down"
