global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'netflix-monitoring'

# Alerting Manager
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules
rule_files:
  - "alerts.yml"

# Scrape configs
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend service
  - job_name: 'netflix-backend'
    static_configs:
      - targets: ['netflix-backend:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Auth service
  - job_name: 'netflix-auth'
    static_configs:
      - targets: ['netflix-auth:5001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Video service
  - job_name: 'netflix-video'
    static_configs:
      - targets: ['netflix-video:5002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  # MongoDB Exporter
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
