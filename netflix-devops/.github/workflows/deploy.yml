name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    - name: Deploy services
      run: |
        kubectl apply -f infrastructure/kubernetes/

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/auth-service
        kubectl rollout status deployment/backend
        kubectl rollout status deployment/video-service

    - name: Check deployment status
      run: kubectl get pods,svc,deployments

    - name: Send Slack notification
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Kubernetes deployment failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment Failed* ❌\nRepository: ${{ github.repository }}\nRef: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
