name: Build and Push Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'auth-service/**'
      - 'video-service/**'
      - 'frontend/**'
      - 'docker/**'

env:
  REGISTRY: docker.io
  IMAGE_REGISTRY_USER: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: docker/Dockerfile.frontend
          - service: backend
            dockerfile: docker/Dockerfile.backend
          - service: auth-service
            dockerfile: docker/Dockerfile.auth
          - service: video-service
            dockerfile: docker/Dockerfile.video
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_USER }}/netflix-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_USER }}/netflix-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_USER }}/netflix-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_USER }}/netflix-${{ matrix.service }}:buildcache,mode=max
