name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  
  push:
    branches: [main]

env:
  CLUSTER_NAME: netflix-devops-cluster
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy backend
        run: |
          kubectl set image deployment/netflix-backend \
            backend=${{ secrets.REGISTRY }}/netflix-backend:${{ github.sha }} \
            -n netflix-devops
          kubectl rollout status deployment/netflix-backend -n netflix-devops
      
      - name: Deploy auth service
        run: |
          kubectl set image deployment/netflix-auth \
            auth=${{ secrets.REGISTRY }}/netflix-auth:${{ github.sha }} \
            -n netflix-devops
          kubectl rollout status deployment/netflix-auth -n netflix-devops
      
      - name: Deploy video service
        run: |
          kubectl set image deployment/netflix-video \
            video=${{ secrets.REGISTRY }}/netflix-video:${{ github.sha }} \
            -n netflix-devops
          kubectl rollout status deployment/netflix-video -n netflix-devops
      
      - name: Deploy frontend
        run: |
          kubectl set image deployment/netflix-frontend \
            frontend=${{ secrets.REGISTRY }}/netflix-frontend:${{ github.sha }} \
            -n netflix-devops
          kubectl rollout status deployment/netflix-frontend -n netflix-devops
      
      - name: Verify deployment
        run: |
          kubectl get deployments -n netflix-devops
          kubectl get pods -n netflix-devops
          kubectl get svc -n netflix-devops
      
      - name: Run smoke tests
        continue-on-error: true
        run: |
          # Wait for services to be ready
          kubectl wait --for=condition=ready pod -l app=netflix-backend -n netflix-devops --timeout=300s
          
          # Test backend health
          kubectl port-forward -n netflix-devops svc/netflix-backend 5000:5000 &
          sleep 5
          curl -f http://localhost:5000/healthz || exit 1
      
      - name: Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Netflix DevOps Deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
